flutter_launcher_icons:
  android: true
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/icons/app_foreground.png"
  image_path: "assets/icons/app.png"
  ios: true
  image_path_ios: "assets/icons/app_ios.png"
  remove_alpha_ios: true